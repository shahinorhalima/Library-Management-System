  #     - .:/app
  #     - /app/node_modules
  #   environment:
  #     - DATABASE_URL=postgresql://admin:admin@postgres:5432/library_management
  #     - NODE_ENV=development
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   command: sh -c "npx prisma migrate deploy && npm run start:dev"

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=library_management
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin'] # ✅ fix
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - '8080:80'
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@gmail.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  postgres_data:
  pgadmin_data:
